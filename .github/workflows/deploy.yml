name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Keys
        run: |
          # config.js의 플레이스홀더를 실제 시크릿 값으로 안전하게 치환
          sed -i "s|선생님의_나이스_API_키|${{ secrets.NEIS_API_KEY }}|g" js/config.js
          sed -i "s|선생님의_다했니_API_키|${{ secrets.DAHANDIN_API_KEY }}|g" js/config.js
          sed -i "s|선생님의_기상청_API_키|${{ secrets.WEATHER_KEY }}|g" js/config.js
          
          # lunch.html의 플레이스홀더도 치환
          sed -i "s|선생님의_나이스_API_키|${{ secrets.NEIS_API_KEY }}|g" lunch.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
