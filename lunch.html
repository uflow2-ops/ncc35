<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3-5반 급식 월드컵 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #e3f2fd; --card: #ffffff; --point: #1e88e5; }
        body { font-family: 'Jua', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* 기본 레이아웃 (매일 투표: 3열/800px) */
        .header, .data-tools, .menu-container, .btn-monthly, .btn-show-result, .stats-section { 
            width: 95%; 
            max-width: 800px; 
            transition: max-width 0.3s ease; 
        }

        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-radius: 20px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-home { padding: 8px 15px; background: #546e7a; color: white; border: none; border-radius: 10px; cursor: pointer; font-family: 'Jua'; }
        #target-date { font-family: 'Jua'; padding: 5px; border-radius: 10px; border: 2px solid var(--point); font-size: 1rem; }
        .btn-monthly { display: none; margin-top: 15px; padding: 18px; background: #fbc02d; color: #5d4037; border: none; border-radius: 20px; cursor: pointer; font-family: 'Jua'; font-size: 1.8rem; font-weight: bold; box-shadow: 0 6px 0 #f9a825; animation: pulse 1.5s infinite; }
        .data-tools { display: flex; gap: 5px; margin-top: 5px; justify-content: flex-end; }
        .btn-data { padding: 5px 10px; font-size: 0.8rem; background: #cfd8dc; color: #37474f; border: none; border-radius: 8px; cursor: pointer; font-family: 'Jua'; }

        .menu-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* 🏆 이달의 메뉴왕 모드 (5열/1200px로 확장) */
        body.monthly-mode .header,
        body.monthly-mode .data-tools,
        body.monthly-mode .menu-container,
        body.monthly-mode .btn-monthly,
        body.monthly-mode .btn-show-result,
        body.monthly-mode .stats-section {
            max-width: 1200px;
        }
        body.monthly-mode .menu-container { grid-template-columns: repeat(5, 1fr); }

        .menu-card { 
            background: var(--card); 
            padding: 12px 5px; 
            border-radius: 15px; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            cursor: pointer; 
            border: 3px solid transparent;
            transition: 0.1s;
        }
        /* 터치 및 마우스 반응 */
        @media (hover: hover) { .menu-card:hover { border-color: var(--point); transform: translateY(-3px); } }
        .menu-card:active { transform: scale(0.95); background: #bbdefb; border-color: var(--point); }
        .menu-card .icon { font-size: 40px; display: block; margin-bottom: 5px; }
        .menu-card .name { font-size: 1.1rem; line-height: 1.2; word-break: keep-all; }

        /* 하단 버튼 및 결과창 */
        .btn-show-result { margin-top: 15px; padding: 12px; background: #ff9800; color: white; border: none; border-radius: 15px; cursor: pointer; font-family: 'Jua'; font-size: 1.3rem; box-shadow: 0 4px 0 #ef6c00; }
        
        .stats-section { display: none; background: white; padding: 15px; border-radius: 20px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 1.1rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initLunch()">

    <div class="header">
        <button class="btn-home" onclick="location.href='index.html'">🏠 홈</button>
        <h2 style="margin:0; color:#1976d2; font-size: 1.3rem;">🍱 오늘 급식 1등은?</h2>
        <input type="date" id="target-date" onchange="resetAndLoad()">
    </div>

    <div class="data-tools">
        <button class="btn-data" onclick="exportLunchData()">💾 투표 결과 저장</button>
        <button class="btn-data" onclick="document.getElementById('import-lunch-file').click()">📂 결과 불러오기</button>
        <input type="file" id="import-lunch-file" style="display:none" accept=".json" onchange="importLunchData(event)">
    </div>

    <div id="menu-list" class="menu-container">
        </div>

    <button id="monthly-king-btn" class="btn-monthly" onclick="loadMonthlyKing()">👑 이번 달 메뉴왕 결정전 (결승전)! 🏆</button>
    <button class="btn-show-result" onclick="toggleStats()">📊 결과 확인 (클릭)</button>

    <div id="stats-area" class="stats-section">
        <div id="vote-results"></div>
    </div>

    <script>
        const API_KEY = '선생님의_나이스_API_키'; 
        const ATPT_CODE = 'K10'; 
        const SCHOOL_CODE = '7812058'; 

        let votes = {};
        let isMonthlyMode = false;

        async function initLunch() {
            const params = new URLSearchParams(window.location.search);
            const dateParam = params.get('date');
            if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
                document.getElementById('target-date').value = dateParam;
            } else {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                document.getElementById('target-date').value = `${year}-${month}-${day}`;
            }
            loadSelectedDateMeal();
            updateMonthlyButtonVisibility();
        }

        function resetAndLoad() {
            isMonthlyMode = false;
            document.body.classList.remove('monthly-mode');
            document.getElementById('stats-area').style.display = 'none';
            document.querySelector('.header h2').innerText = "🍱 오늘 급식 1등은?";
            loadSelectedDateMeal();
            updateMonthlyButtonVisibility();
        }

        function updateMonthlyButtonVisibility() {
            const dateInput = document.getElementById('target-date').value;
            const btn = document.getElementById('monthly-king-btn');
            if (!btn) return;
            if (isLastWeekdayOfMonth(new Date(dateInput))) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        async function loadSelectedDateMeal() {
            const dateInput = document.getElementById('target-date').value;
            const yyyymmdd = dateInput.replace(/-/g, '');
            const container = document.getElementById('menu-list');
            container.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>로딩 중...</div>";

            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&MLSV_YMD=${yyyymmdd}`);
                const data = await res.json();
                
                if(data.mealServiceDietInfo) {
                    const rawMenu = data.mealServiceDietInfo[1].row[0].DDISH_NM;
                    const menus = rawMenu.split('<br/>')
                        .map(m => m.replace(/[0-9.]/g, '').replace(/\(\)/g, '').trim())
                        .filter(m => m !== "" && !m.includes("우유"));
                    
                    votes = JSON.parse(localStorage.getItem(`votes_${yyyymmdd}`) || '{}');
                    renderMenus(menus);
                } else {
                    container.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>정보 없음</div>";
                }
            } catch (e) { container.innerHTML = "오류 발생"; }
        }

        function loadMonthlyKing() {
            isMonthlyMode = true;
            document.body.classList.add('monthly-mode');
            const dateInput = document.getElementById('target-date').value;
            const monthPrefix = "votes_" + dateInput.substring(0, 7).replace('-', '');
            const finalists = [];

            // 해당 월의 모든 날짜(1~31일)를 돌며 1등 메뉴를 수집
            for (let i = 1; i <= 31; i++) {
                const dayKey = monthPrefix + String(i).padStart(2, '0');
                const dayData = JSON.parse(localStorage.getItem(dayKey) || 'null');
                if (dayData && typeof dayData === 'object' && Object.keys(dayData).length > 0) {
                    const sortedDay = Object.entries(dayData).sort((a, b) => b[1] - a[1]);
                    const top = sortedDay[0];
                    if (top && !finalists.includes(top[0])) {
                        finalists.push(top[0]);
                    }
                }
            }
            
            const container = document.getElementById('menu-list');
            if (finalists.length === 0) {
                container.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>이번 달 투표 데이터가 부족해요!</div>";
                return;
            }

            const monthLabel = dateInput.substring(5, 7) + "월";
            document.querySelector('.header h2').innerText = `🏆 ${monthLabel}의 메뉴왕 결정전!`;
            renderMenus(finalists, true);
        }

        function renderMenus(menus, isMonthly = false) {
            const container = document.getElementById('menu-list');
            const icons = isMonthly ? ['🏆'] : ['🍚', '🥘', '🍖', '🍤', '🥗', '🥘'];
            container.innerHTML = '';
            (isMonthly ? menus.slice(0, 15) : menus.slice(0, 9)).forEach((menu, idx) => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `<span class="icon">${icons[idx % icons.length]}</span><div class="name"></div>`;
                card.querySelector('.name').textContent = menu;
                card.onclick = () => handleVote(menu);
                container.appendChild(card);
            });
        }

        function handleVote(menu) {
            const dateInput = document.getElementById('target-date').value;
            if (isMonthlyMode) {
                const monthKey = dateInput.substring(0, 7).replace('-', '');
                const key = `monthly_votes_${monthKey}`;
                let mVotes = JSON.parse(localStorage.getItem(key) || '{}');
                mVotes[menu] = (mVotes[menu] || 0) + 1;
                localStorage.setItem(key, JSON.stringify(mVotes));
            } else {
                const dateKey = dateInput.replace(/-/g, '');
                votes[menu] = (votes[menu] || 0) + 1;
                localStorage.setItem(`votes_${dateKey}`, JSON.stringify(votes));
            }
            // 터치 효과를 위해 알림창 없이 진행 (조용히 투표)
        }

        function toggleStats() {
            const statsArea = document.getElementById('stats-area');
            if(statsArea.style.display === 'none' || statsArea.style.display === '') {
                updateStatsDisplay();
                statsArea.style.display = 'block';
            } else {
                statsArea.style.display = 'none';
            }
        }

        function updateStatsDisplay() {
            let currentVotes = votes;
            if (isMonthlyMode) {
                const monthKey = document.getElementById('target-date').value.substring(0, 7).replace('-', '');
                currentVotes = JSON.parse(localStorage.getItem(`monthly_votes_${monthKey}`) || '{}');
            }
            const sorted = Object.entries(currentVotes).sort((a, b) => b[1] - a[1]);
            document.getElementById('vote-results').innerHTML = sorted.map(([name, count], idx) => `
                <div class="rank-item">
                    <span>${idx === 0 ? (isMonthlyMode ? '🏆' : '👑') : idx + 1} <b>${name}</b></span>
                    <span>${count}표</span>
                </div>
            `).join('') || "투표 없음";
        }

        function isLastWeekdayOfMonth(d) {
            const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
            let lastWeekday = new Date(lastDay);
            while (lastWeekday.getDay() === 0 || lastWeekday.getDay() === 6) {
                lastWeekday.setDate(lastWeekday.getDate() - 1);
            }
            return d.getDate() === lastWeekday.getDate();
        }

        // 🍱 급식 투표 데이터만 전용으로 내보내기
        function exportLunchData() {
            let exportObj = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                // 급식 투표와 관련된 키만 수집
                if (key.startsWith('votes_') || key.startsWith('monthly_votes_')) {
                    exportObj[key] = localStorage.getItem(key);
                }
            }
            const dateInput = document.getElementById('target-date').value;
            const fileName = `3-5반_급식투표_${dateInput.substring(0, 7)}월_데이터.json`;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", fileName);
            dlAnchorElem.click();
        }

        // 🍱 저장된 급식 투표 데이터만 불러오기
        function importLunchData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const importedData = JSON.parse(e.target.result);
                for(let key in importedData) { localStorage.setItem(key, importedData[key]); }
                alert("급식 투표 데이터가 복구되었습니다!");
                location.reload();
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
